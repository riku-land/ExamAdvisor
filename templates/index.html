<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>受験アドバイザー</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <h1>受験アドバイザー</h1>

    <form action="/result" method="post">

        <label for="score">現在の偏差値</label><br>
        <input type="number" id="score" name="score"><br><br>

        <label>志望分野</label><br>
        <select id="faculty" name="faculty">
            <option>情報工学</option>
            <option>機械工学</option>
            <option>経済学</option>
        </select><br><br>

        <label>地域</label><br>
        <select id="area" name="area">
            <option>関西</option>
            <option>関東</option>
            <option>中部</option>
        </select><br><br>

        <button>診断する</button>

    </form>

</body>
</html>
