{% extends "base.html" %}

{% block title %}
入力画面に戻る
{% endblock %}


{% block content %}

    <h1>受験アドバイザー</h1>

    <form action="/result" method="post">

        <label>
            現在の偏差値
        </label><br>


        <input 
            type="number" 
            id="score" 
            name="score"
            min="20"
            max="80"
            required
        ><br><br>

        <label>志望分野</label><br>

        <select name="faculty">
            <option>情報工学</option>
            <option>機械工学</option>
            <option>経済学</option>
        </select><br><br>

        <label>地域</label><br>

        <select name="area">
            <option>関西</option>
            <option>関東</option>
            <option>中部</option>
        </select><br><br>

        <button>診断する</button>

    </form>

{% endblock %}
