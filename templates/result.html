{% extends base.html" %}

{% block title %}
診断結果
{% endblock %}

{% block content %}

    <h1>診断結果</h1>

    <div class="result-card">

        <p>偏差値 : {{ score }}</p>
        <p>志望分野 : {{ faculty }}</p>
        <p>地域 : {{ area }}</p>

    </div>

    <div class="result-card">

        <h2>おすすめ大学</h2>

        {% for university in recommended_universities %}
            <p>{{ university }}</p>
        {% endfor %}

    </div>
    

    <a href="/">もう一度診断する</a>

{% endblock %}
